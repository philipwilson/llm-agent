[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "llm-agent"
version = "0.1.0"
description = "A Unix CLI agent powered by Claude"
requires-python = ">=3.9"
dependencies = ["anthropic"]

[project.optional-dependencies]
vertex = ["anthropic[vertex]"]

[project.scripts]
llm-agent = "llm_agent.cli:main"

[tool.setuptools.package-data]
llm_agent = ["system_prompt.txt"]
